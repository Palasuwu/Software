<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" font-family="Arial, sans-serif" font-size="9">
  <rect width="1200" height="900" fill="#f9fffe"/>

  <!-- Title -->
  <rect x="0" y="0" width="1200" height="34" fill="#1B4332"/>
  <text x="600" y="22" fill="white" font-size="13" font-weight="bold" text-anchor="middle">DIAGRAMA DE CLASES — Sistema Red de Donaciones</text>

  <!-- ══════════ USUARIO (parent) ══════════ -->
  <g id="usuario">
    <rect x="480" y="50" width="240" height="130" fill="#d1fae5" stroke="#1B4332" stroke-width="2" rx="3"/>
    <rect x="480" y="50" width="240" height="22"  fill="#1B4332" rx="3"/>
    <rect x="480" y="61" width="240" height="11"  fill="#1B4332"/>
    <text x="600" y="65" fill="white" font-size="10" font-weight="bold" text-anchor="middle">«clase padre» Usuario</text>
    <line x1="480" y1="72" x2="720" y2="72" stroke="#1B4332" stroke-width="1.5"/>
    <text x="488" y="84"  fill="#1B4332" font-size="8.5">+ id_usuario: INT</text>
    <text x="488" y="95"  fill="#1B4332" font-size="8.5">+ nombre: VARCHAR(200)</text>
    <text x="488" y="106" fill="#1B4332" font-size="8.5">+ correo: VARCHAR(200)</text>
    <text x="488" y="117" fill="#1B4332" font-size="8.5">+ password: VARCHAR(200)</text>
    <text x="488" y="128" fill="#1B4332" font-size="8.5">+ telefono: VARCHAR(100)</text>
    <text x="488" y="139" fill="#1B4332" font-size="8.5">+ fecha_registro: DATE</text>
    <text x="488" y="150" fill="#1B4332" font-size="8.5">+ rol: ENUM</text>
    <text x="488" y="161" fill="#1B4332" font-size="8.5">+ activo: TINYINT</text>
    <text x="488" y="172" fill="#555" font-size="8" font-style="italic">+ login() + logout()</text>
  </g>

  <!-- ══════════ DONANTE ══════════ -->
  <g id="donante">
    <rect x="220" y="270" width="220" height="120" fill="#bbf7d0" stroke="#1B4332" stroke-width="1.5" rx="3"/>
    <rect x="220" y="270" width="220" height="20"  fill="#2D6A4F" rx="3"/>
    <rect x="220" y="279" width="220" height="11"  fill="#2D6A4F"/>
    <text x="330" y="284" fill="white" font-size="10" font-weight="bold" text-anchor="middle">Donante</text>
    <text x="328" y="284" fill="#a7f3d0" font-size="8" text-anchor="middle"> «hereda Usuario»</text>
    <line x1="220" y1="290" x2="440" y2="290" stroke="#1B4332" stroke-width="1"/>
    <text x="228" y="302" fill="#1B4332" font-size="8.5">+ id_usuario: INT (PK/FK)</text>
    <text x="228" y="313" fill="#1B4332" font-size="8.5">+ departamento: VARCHAR</text>
    <text x="228" y="324" fill="#1B4332" font-size="8.5">+ municipio: VARCHAR</text>
    <text x="228" y="335" fill="#1B4332" font-size="8.5">+ zona: VARCHAR</text>
    <text x="228" y="346" fill="#1B4332" font-size="8.5">+ direccion_detalle: VARCHAR</text>
    <text x="228" y="360" fill="#555" font-size="8" font-style="italic">+ registrarDonacion()</text>
    <text x="228" y="371" fill="#555" font-size="8" font-style="italic">+ consultarEstado()</text>
    <text x="228" y="382" fill="#555" font-size="8" font-style="italic">+ consultarHistorial()</text>
  </g>

  <!-- ══════════ INTERMEDIARIO ══════════ -->
  <g id="intermediario">
    <rect x="760" y="270" width="220" height="120" fill="#bbf7d0" stroke="#1B4332" stroke-width="1.5" rx="3"/>
    <rect x="760" y="270" width="220" height="20"  fill="#2D6A4F" rx="3"/>
    <rect x="760" y="279" width="220" height="11"  fill="#2D6A4F"/>
    <text x="870" y="284" fill="white" font-size="10" font-weight="bold" text-anchor="middle">Intermediario</text>
    <text x="868" y="284" fill="#a7f3d0" font-size="8" text-anchor="middle"> «hereda Usuario»</text>
    <line x1="760" y1="290" x2="980" y2="290" stroke="#1B4332" stroke-width="1"/>
    <text x="768" y="302" fill="#1B4332" font-size="8.5">+ id_usuario: INT (PK/FK)</text>
    <text x="768" y="313" fill="#1B4332" font-size="8.5">+ id_organizacion: INT (FK)</text>
    <text x="768" y="324" fill="#1B4332" font-size="8.5">+ cargo: VARCHAR</text>
    <text x="768" y="360" fill="#555" font-size="8" font-style="italic">+ publicarNecesidad()</text>
    <text x="768" y="371" fill="#555" font-size="8" font-style="italic">+ gestionarDonacion()</text>
    <text x="768" y="382" fill="#555" font-size="8" font-style="italic">+ actualizarEstado()</text>
  </g>

  <!-- ══════════ ORGANIZACION ══════════ -->
  <g id="organizacion">
    <rect x="760" y="50" width="220" height="115" fill="#d1fae5" stroke="#1B4332" stroke-width="1.5" rx="3"/>
    <rect x="760" y="50" width="220" height="20"  fill="#1B4332" rx="3"/>
    <rect x="760" y="61" width="220" height="9"   fill="#1B4332"/>
    <text x="870" y="64" fill="white" font-size="10" font-weight="bold" text-anchor="middle">Organizacion</text>
    <line x1="760" y1="70" x2="980" y2="70" stroke="#1B4332" stroke-width="1"/>
    <text x="768" y="82"  fill="#1B4332" font-size="8.5">+ id_organizacion: INT</text>
    <text x="768" y="93"  fill="#1B4332" font-size="8.5">+ nombre: VARCHAR</text>
    <text x="768" y="104" fill="#1B4332" font-size="8.5">+ descripcion: VARCHAR</text>
    <text x="768" y="115" fill="#1B4332" font-size="8.5">+ direccion: VARCHAR</text>
    <text x="768" y="126" fill="#1B4332" font-size="8.5">+ telefono: VARCHAR</text>
    <text x="768" y="137" fill="#1B4332" font-size="8.5">+ correo: VARCHAR</text>
    <text x="768" y="148" fill="#1B4332" font-size="8.5">+ estado_verificacion: VARCHAR</text>
  </g>

  <!-- ══════════ PUBLICACION ══════════ -->
  <g id="publicacion">
    <rect x="460" y="480" width="280" height="165" fill="#d1fae5" stroke="#1B4332" stroke-width="1.5" rx="3"/>
    <rect x="460" y="480" width="280" height="20"  fill="#1B4332" rx="3"/>
    <rect x="460" y="491" width="280" height="9"   fill="#1B4332"/>
    <text x="600" y="494" fill="white" font-size="10" font-weight="bold" text-anchor="middle">Publicacion</text>
    <line x1="460" y1="500" x2="740" y2="500" stroke="#1B4332" stroke-width="1"/>
    <text x="468" y="512" fill="#1B4332" font-size="8.5">+ id_publicacion: INT</text>
    <text x="468" y="523" fill="#1B4332" font-size="8.5">+ id_intermediario: INT (FK)</text>
    <text x="468" y="534" fill="#1B4332" font-size="8.5">+ id_organizacion: INT (FK)</text>
    <text x="468" y="545" fill="#1B4332" font-size="8.5">+ id_articulo: INT (FK)</text>
    <text x="468" y="556" fill="#1B4332" font-size="8.5">+ titulo: VARCHAR</text>
    <text x="468" y="567" fill="#1B4332" font-size="8.5">+ descripcion: VARCHAR</text>
    <text x="468" y="578" fill="#1B4332" font-size="8.5">+ cantidad_necesaria: INT</text>
    <text x="468" y="589" fill="#1B4332" font-size="8.5">+ cantidad_recibida: INT</text>
    <text x="468" y="600" fill="#1B4332" font-size="8.5">+ fecha_publicacion / fecha_limite: DATE</text>
    <text x="468" y="611" fill="#1B4332" font-size="8.5">+ estado: ENUM(activa/finalizada/cancelada)</text>
    <text x="468" y="622" fill="#1B4332" font-size="8.5">+ imagen_url: VARCHAR</text>
  </g>

  <!-- ══════════ DONACION ══════════ -->
  <g id="donacion">
    <rect x="190" y="480" width="220" height="120" fill="#d1fae5" stroke="#1B4332" stroke-width="1.5" rx="3"/>
    <rect x="190" y="480" width="220" height="20"  fill="#1B4332" rx="3"/>
    <rect x="190" y="491" width="220" height="9"   fill="#1B4332"/>
    <text x="300" y="494" fill="white" font-size="10" font-weight="bold" text-anchor="middle">Donacion</text>
    <line x1="190" y1="500" x2="410" y2="500" stroke="#1B4332" stroke-width="1"/>
    <text x="198" y="512" fill="#1B4332" font-size="8.5">+ id_donacion: INT</text>
    <text x="198" y="523" fill="#1B4332" font-size="8.5">+ id_donante: INT (FK)</text>
    <text x="198" y="534" fill="#1B4332" font-size="8.5">+ id_publicacion: INT (FK)</text>
    <text x="198" y="545" fill="#1B4332" font-size="8.5">+ id_estado_donacion: INT (FK)</text>
    <text x="198" y="556" fill="#1B4332" font-size="8.5">+ descripcion: VARCHAR</text>
    <text x="198" y="567" fill="#1B4332" font-size="8.5">+ foto: BYTES</text>
    <text x="198" y="578" fill="#1B4332" font-size="8.5">+ fecha_donacion: DATE</text>
  </g>

  <!-- ══════════ DONACIONARTICULO ══════════ -->
  <g id="donacionarticulo">
    <rect x="30" y="680" width="220" height="100" fill="#d1fae5" stroke="#1B4332" stroke-width="1.5" rx="3"/>
    <rect x="30" y="680" width="220" height="20"  fill="#40916C" rx="3"/>
    <rect x="30" y="691" width="220" height="9"   fill="#40916C"/>
    <text x="140" y="694" fill="white" font-size="10" font-weight="bold" text-anchor="middle">DonacionArticulo</text>
    <line x1="30" y1="700" x2="250" y2="700" stroke="#40916C" stroke-width="1"/>
    <text x="38" y="712" fill="#1B4332" font-size="8.5">+ id_donacion_articulo: INT</text>
    <text x="38" y="723" fill="#1B4332" font-size="8.5">+ id_donacion: INT (FK)</text>
    <text x="38" y="734" fill="#1B4332" font-size="8.5">+ id_articulo: INT (FK)</text>
    <text x="38" y="745" fill="#1B4332" font-size="8.5">+ cantidad: INT</text>
    <text x="38" y="756" fill="#1B4332" font-size="8.5">+ estado_articulo: VARCHAR</text>
    <text x="38" y="770" fill="#555" font-size="8" font-style="italic">+ aceptar() + rechazar()</text>
  </g>

  <!-- ══════════ ARTICULO ══════════ -->
  <g id="articulo">
    <rect x="300" y="680" width="220" height="90" fill="#d1fae5" stroke="#1B4332" stroke-width="1.5" rx="3"/>
    <rect x="300" y="680" width="220" height="20"  fill="#1B4332" rx="3"/>
    <rect x="300" y="691" width="220" height="9"   fill="#1B4332"/>
    <text x="410" y="694" fill="white" font-size="10" font-weight="bold" text-anchor="middle">Articulo</text>
    <line x1="300" y1="700" x2="520" y2="700" stroke="#1B4332" stroke-width="1"/>
    <text x="308" y="712" fill="#1B4332" font-size="8.5">+ id_articulo: INT</text>
    <text x="308" y="723" fill="#1B4332" font-size="8.5">+ nombre: VARCHAR</text>
    <text x="308" y="734" fill="#1B4332" font-size="8.5">+ descripcion: VARCHAR</text>
    <text x="308" y="745" fill="#1B4332" font-size="8.5">+ id_categoria: INT (FK)</text>
  </g>

  <!-- ══════════ CATEGORIAARTICULO ══════════ -->
  <g id="categoria">
    <rect x="560" y="680" width="200" height="90" fill="#d1fae5" stroke="#1B4332" stroke-width="1.5" rx="3"/>
    <rect x="560" y="680" width="200" height="20"  fill="#1B4332" rx="3"/>
    <rect x="560" y="691" width="200" height="9"   fill="#1B4332"/>
    <text x="660" y="694" fill="white" font-size="10" font-weight="bold" text-anchor="middle">CategoriaArticulo</text>
    <line x1="560" y1="700" x2="760" y2="700" stroke="#1B4332" stroke-width="1"/>
    <text x="568" y="712" fill="#1B4332" font-size="8.5">+ id_categoria: INT</text>
    <text x="568" y="723" fill="#1B4332" font-size="8.5">+ nombre: VARCHAR</text>
    <text x="568" y="734" fill="#1B4332" font-size="8.5">+ descripcion: VARCHAR</text>
  </g>

  <!-- ══════════ PUNTOENTREGA ══════════ -->
  <g id="puntoentrega">
    <rect x="800" y="480" width="220" height="110" fill="#d1fae5" stroke="#1B4332" stroke-width="1.5" rx="3"/>
    <rect x="800" y="480" width="220" height="20"  fill="#1B4332" rx="3"/>
    <rect x="800" y="491" width="220" height="9"   fill="#1B4332"/>
    <text x="910" y="494" fill="white" font-size="10" font-weight="bold" text-anchor="middle">PuntoEntrega</text>
    <line x1="800" y1="500" x2="1020" y2="500" stroke="#1B4332" stroke-width="1"/>
    <text x="808" y="512" fill="#1B4332" font-size="8.5">+ id_punto_entrega: INT</text>
    <text x="808" y="523" fill="#1B4332" font-size="8.5">+ id_organizacion: INT (FK)</text>
    <text x="808" y="534" fill="#1B4332" font-size="8.5">+ departamento: VARCHAR</text>
    <text x="808" y="545" fill="#1B4332" font-size="8.5">+ municipio: VARCHAR</text>
    <text x="808" y="556" fill="#1B4332" font-size="8.5">+ zona: VARCHAR</text>
    <text x="808" y="567" fill="#1B4332" font-size="8.5">+ descripcion: VARCHAR</text>
  </g>

  <!-- ══════════ ESTADODONACION ══════════ -->
  <g id="estadodonacion">
    <rect x="800" y="680" width="190" height="90" fill="#d1fae5" stroke="#1B4332" stroke-width="1.5" rx="3"/>
    <rect x="800" y="680" width="190" height="20"  fill="#1B4332" rx="3"/>
    <rect x="800" y="691" width="190" height="9"   fill="#1B4332"/>
    <text x="895" y="694" fill="white" font-size="10" font-weight="bold" text-anchor="middle">EstadoDonacion</text>
    <line x1="800" y1="700" x2="990" y2="700" stroke="#1B4332" stroke-width="1"/>
    <text x="808" y="712" fill="#1B4332" font-size="8.5">+ id_estado_donacion: INT</text>
    <text x="808" y="723" fill="#1B4332" font-size="8.5">+ nombre: VARCHAR</text>
    <text x="808" y="734" fill="#1B4332" font-size="8.5">+ descripcion: VARCHAR</text>
  </g>

  <!-- ══════════ MOTIVORECHAZO ══════════ -->
  <g id="motivorechazo">
    <rect x="1010" y="680" width="180" height="100" fill="#d1fae5" stroke="#1B4332" stroke-width="1.5" rx="3"/>
    <rect x="1010" y="680" width="180" height="20"  fill="#1B4332" rx="3"/>
    <rect x="1010" y="691" width="180" height="9"   fill="#1B4332"/>
    <text x="1100" y="694" fill="white" font-size="10" font-weight="bold" text-anchor="middle">MotivoRechazo</text>
    <line x1="1010" y1="700" x2="1190" y2="700" stroke="#1B4332" stroke-width="1"/>
    <text x="1018" y="712" fill="#1B4332" font-size="8.5">+ id_motivo_rechazo: INT</text>
    <text x="1018" y="723" fill="#1B4332" font-size="8.5">+ id_donacion: INT (FK)</text>
    <text x="1018" y="734" fill="#1B4332" font-size="8.5">+ descripcion: VARCHAR</text>
    <text x="1018" y="745" fill="#1B4332" font-size="8.5">+ fecha_rechazo: DATE</text>
  </g>

  <!-- ══════════ RELATIONSHIPS ══════════ -->

  <!-- Usuario → Donante (herencia) -->
  <line x1="540" y1="180" x2="330" y2="270" stroke="#1B4332" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="330,270 322,256 338,256" fill="white" stroke="#1B4332" stroke-width="1.5"/>
  <text x="410" y="228" fill="#2D6A4F" font-size="8" font-style="italic">«hereda»</text>

  <!-- Usuario → Intermediario (herencia) -->
  <line x1="660" y1="180" x2="870" y2="270" stroke="#1B4332" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="870,270 862,256 878,256" fill="white" stroke="#1B4332" stroke-width="1.5"/>
  <text x="745" y="228" fill="#2D6A4F" font-size="8" font-style="italic">«hereda»</text>

  <!-- Intermediario → Organizacion (pertenece a) -->
  <line x1="870" y1="270" x2="870" y2="165" stroke="#1B4332" stroke-width="1"/>
  <line x1="870" y1="165" x2="980" y2="165" stroke="#1B4332" stroke-width="1"/>
  <line x1="980" y1="165" x2="980" y2="165" stroke="#1B4332" stroke-width="1"/>
  <text x="920" y="155" fill="#555" font-size="8">pertenece a</text>

  <!-- Intermediario → Publicacion (realiza) -->
  <line x1="760" y1="330" x2="600" y2="480" stroke="#1B4332" stroke-width="1"/>
  <text x="665" y="400" fill="#555" font-size="8">realiza</text>

  <!-- Organizacion → Publicacion (tiene) -->
  <line x1="870" y1="165" x2="660" y2="480" stroke="#1B4332" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="730" y="350" fill="#555" font-size="8">tiene</text>

  <!-- Donante → Donacion (realiza) -->
  <line x1="330" y1="390" x2="300" y2="480" stroke="#1B4332" stroke-width="1"/>
  <text x="295" y="440" fill="#555" font-size="8">realiza</text>

  <!-- Donacion → Publicacion (responde a) -->
  <line x1="410" y1="540" x2="460" y2="560" stroke="#1B4332" stroke-width="1"/>
  <text x="415" y="553" fill="#555" font-size="8">responde a</text>

  <!-- Donacion → DonacionArticulo (contiene) -->
  <line x1="250" y1="600" x2="140" y2="680" stroke="#1B4332" stroke-width="1"/>
  <text x="160" y="645" fill="#555" font-size="8">contiene</text>

  <!-- Publicacion → Articulo -->
  <line x1="600" y1="645" x2="500" y2="680" stroke="#1B4332" stroke-width="1"/>
  <text x="510" y="668" fill="#555" font-size="8">solicita</text>

  <!-- Articulo → CategoriaArticulo -->
  <line x1="520" y1="725" x2="560" y2="720" stroke="#1B4332" stroke-width="1"/>
  <text x="525" y="710" fill="#555" font-size="8">clasifica</text>

  <!-- Organizacion → PuntoEntrega -->
  <line x1="980" y1="120" x2="910" y2="480" stroke="#1B4332" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="965" y="330" fill="#555" font-size="8">tiene</text>

  <!-- Donacion → EstadoDonacion -->
  <line x1="410" y1="550" x2="800" y2="720" stroke="#1B4332" stroke-width="1"/>
  <text x="580" y="640" fill="#555" font-size="8">define estado</text>

  <!-- Donacion → MotivoRechazo -->
  <line x1="410" y1="570" x2="1010" y2="730" stroke="#1B4332" stroke-width="1"/>
  <text x="700" y="680" fill="#555" font-size="8">puede tener</text>

  <!-- Legend -->
  <rect x="0" y="860" width="1200" height="40" fill="#f0fff4" stroke="#1B4332" stroke-width="1"/>
  <text x="20" y="878" fill="#1B4332" font-size="9" font-weight="bold">LEYENDA:</text>
  <rect x="90" y="864" width="25" height="12" fill="#1B4332"/>
  <text x="120" y="874" fill="#333" font-size="9">Clase (con atributos)</text>
  <line x1="230" y1="870" x2="270" y2="870" stroke="#1B4332" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="270,870 262,866 262,874" fill="white" stroke="#1B4332" stroke-width="1.5"/>
  <text x="275" y="874" fill="#333" font-size="9">Herencia</text>
  <line x1="370" y1="870" x2="410" y2="870" stroke="#1B4332" stroke-width="1.5"/>
  <text x="415" y="874" fill="#333" font-size="9">Asociación / Relación</text>
  <text x="800" y="878" fill="#555" font-size="9">Sistema web de gestión de donaciones · UVG 2026</text>
</svg>
