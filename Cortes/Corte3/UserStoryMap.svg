  <text x="582" y="153" fill="#1B4332" font-size="8.5" text-anchor="middle">Seleccionar organización</text>
  <text x="582" y="165" fill="#1B4332" font-size="8.5" text-anchor="middle">y artículo a donar</text>

  <rect x="468" y="179" width="229" height="38" fill="#bbf7d0" stroke="#aaa" stroke-width="0.7"/>
  <text x="582" y="193" fill="#1B4332" font-size="8.5" text-anchor="middle">Indicar cantidad</text>
  <text x="582" y="205" fill="#1B4332" font-size="8.5" text-anchor="middle">y descripción del artículo</text>

