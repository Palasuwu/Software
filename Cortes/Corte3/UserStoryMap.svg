  <!-- Activity headers at y=38 (height=35) -->
  <!-- Backbone stories at y=73 (height=50) -->
  <!-- Tasks row 1 at y=123 (height=44) -->
  <!-- Tasks row 2 at y=167 (height=44) -->
  <!-- Tasks row 3 at y=211 (height=44) -->
  <!-- Release lines -->

  <!-- ── ACTIVITY HEADERS ── -->
  <rect x="0"    y="38" width="233" height="35" fill="#2D6A4F"/>
