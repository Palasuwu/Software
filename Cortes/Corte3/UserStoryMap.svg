  <text x="116" y="165" fill="#1B4332" font-size="8.5" text-anchor="middle">y cantidad necesaria</text>

  <rect x="2"   y="179" width="229" height="38" fill="#bbf7d0" stroke="#aaa" stroke-width="0.7"/>
  <text x="116" y="193" fill="#1B4332" font-size="8.5" text-anchor="middle">Publicar necesidades de</text>
