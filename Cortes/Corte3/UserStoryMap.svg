  <rect x="233"  y="38" width="233" height="35" fill="#2D6A4F"/>
  <text x="349"  y="60" fill="white" font-size="11" font-weight="bold" text-anchor="middle">CONSULTAR INFORMACIÓN</text>

  <rect x="466"  y="38" width="233" height="35" fill="#2D6A4F"/>
  <text x="582"  y="60" fill="white" font-size="11" font-weight="bold" text-anchor="middle">REGISTRAR DONACIONES</text>

